name: Release meows
on:
  pull_request:
    paths:
      - VERSION
  push:
    branches:
      - main
    paths:
      - VERSION
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  version:
    name: Read and validate version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate inputs
        id: version
        run: |
          VERSION=$(cat VERSION)
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format. Please use X.Y.Z"
            exit 1
          fi
          git fetch --tags
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists"
            exit 1
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
  push-controller-image:
    name: Push controller image
    if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
    needs: version
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: make image
      - run: make tag push IMAGE_PREFIX=ghcr.io/cybozu-go/ IMAGE_TAG=${VERSION}
  release:
    name: Release on GitHub
    if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
    needs:
      - version
      - push-controller-image
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup git config
        run: |
          git config --global user.name github-actions
          git config --global user.email github-actions@github.com
      - name: Create tag
        run: |
          git tag -a -m "Release v${VERSION}" "v${VERSION}"
          git tag -ln | grep "v${VERSION}"
          git push origin "v${VERSION}"
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${VERSION}" \
            -t "Release v${VERSION}" \
            --generate-notes

  # After the controller released successfully,
  # release runner images based on the runner.json from the released tag
  get-released-versions:
    name: Get released versions for runner images
    if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
    needs:
      - version
      - release
    runs-on: ubuntu-24.04
    env:
      VERSION: ${{ needs.version.outputs.version }}
    outputs:
      meows_version: ${{ steps.versions.outputs.meows_version }}
      runner_version: ${{ steps.versions.outputs.runner_version }}
      runner_sha256: ${{ steps.versions.outputs.runner_sha256 }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: v${{ env.VERSION }}
      - name: Read versions
        id: versions
        run: |
          echo "meows_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "runner_version=$(jq -r .version runner-images/runner.json)" >> $GITHUB_OUTPUT
          echo "runner_sha256=$(jq -r .sha256 runner-images/runner.json)" >> $GITHUB_OUTPUT
  build-and-push-runner-images:
    name: Build and push runner images
    if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
    needs: get-released-versions
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-build-and-push-runner-images.yaml
    with:
      meows_version: ${{ needs.get-released-versions.outputs.meows_version }}
      runner_version: ${{ needs.get-released-versions.outputs.runner_version }}
      runner_sha256: ${{ needs.get-released-versions.outputs.runner_sha256 }}
      push_image: true
