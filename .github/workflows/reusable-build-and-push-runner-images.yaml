name: Reusable build and push runner images
on:
  workflow_call:
    inputs:
      meows_version:
        description: "Checkout this meows version during workflow.(Not include v prefix)"
        required: true
        type: string
      runner_version:
        description: "GitHub Actions runner version.(Not include v prefix)"
        required: true
        type: string
      runner_sha256:
        description: "SHA256 checksum of the actions/runner(actions-runner-linux-x64)"
        required: true
        type: string
      push_image:
        description: "Push image to container registry"
        default: false
        required: false
        type: boolean

jobs:
  build-and-push-runner-images:
    name: Build runner ${{ matrix.os }}(${{ matrix.dir }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      PACKAGE_NAME: "ghcr.io/cybozu-go/meows-runner"
    strategy:
      fail-fast: false
      matrix:
        include:
          # runner image list
          # Please update after confirming that placemat supports the relevant Ubuntu version.
          - dir: "./runner-images/ubuntu22.04"
            os: "ubuntu22.04"
            latest: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: v${{ inputs.meows_version }}
      - name: Environment variables
        run: |
          echo "LATEST_TAG=${{ env.PACKAGE_NAME }}:latest" >> $GITHUB_ENV
      - name: Login to GitHub Container Registry
        if: ${{ inputs.push_image }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify to prevent overwrite of existing non-overwritable tags
        run: |
          for tag in $TAG_LIST; do
            if docker manifest inspect "$tag" > /dev/null 2>&1; then
              echo "Tag already exists: $tag"
              exit 1
            fi
          done
        env:
          TAG_LIST: >
            ${{ env.PACKAGE_NAME }}:${{ inputs.runner_version }}-${{ matrix.os }}-meows${{ inputs.meows_version }}
      - name: Build and Push Image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          build-args: |
            RUNNER_VERSION=${{ inputs.runner_version }}
            RUNNER_SHA256=${{ inputs.runner_sha256 }}
          context: .
          file: ${{ matrix.dir }}/Dockerfile
          push: ${{ inputs.push_image }}
          tags: |
            ${{ env.PACKAGE_NAME }}:${{ matrix.os }}
            ${{ env.PACKAGE_NAME }}:${{ matrix.os }}-meows${{ inputs.meows_version }}
            ${{ env.PACKAGE_NAME }}:${{ inputs.runner_version }}-${{ matrix.os }}-meows${{ inputs.meows_version }}
            ${{ matrix.latest &&  env.LATEST_TAG || '' }}
